services:
  backend:
    build:
      context: ./afamar-backend
    image: afamar-backend:latest
    container_name: afamar-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3095/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - infra-net
    ports:
      - ${API_PORT:-3095}:3095
    restart: unless-stopped

  frontend:
    build:
      context: ./afamar-frontend
    image: afamar-frontend:latest
    container_name: afamar-frontend
    environment:
      - API_URL=${API_URL:-/api/v1}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3090"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - ${WEB_PORT:-3090}:80
    networks:
      - infra-net
    restart: unless-stopped

networks:
  infra-net:
    driver: bridge
    name: infra-net
    enable_ipv6: false
    external: true
